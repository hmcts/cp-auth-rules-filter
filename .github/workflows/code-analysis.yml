name: Code analysis

on:
  pull_request:
    branches:
      - master
      - main

jobs:
  pmd-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: current

      - name: Run PMD
        run: ./gradlew pmdMain pmdTest --continue || true

      - name: Report PMD violations
        run: |
          python3 << 'EOF'
          import xml.etree.ElementTree as ET, glob, sys
          violations = []
          for report in glob.glob('build/reports/pmd/*.xml'):
              tree = ET.parse(report)
              for file_el in tree.findall('file'):
                  path = file_el.get('name').split('/src/')[-1]
                  for v in file_el.findall('violation'):
                      violations.append(
                          f"src/{path}:{v.get('beginline')} [{v.get('ruleset')} / {v.get('rule')}] {v.text.strip()}"
                      )
          for v in sorted(violations):
              print(v)
          if violations:
              print(f'\nTotal: {len(violations)} PMD violation(s)')
              sys.exit(1)
          print('No PMD violations found')
          EOF
